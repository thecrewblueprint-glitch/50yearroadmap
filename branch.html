<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch — Deadhang Labor</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .branch-layout {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 32px;
            align-items: start;
        }

        /* ---- Sitemap / menu ---- */
        .sitemap {
            position: sticky;
            top: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
        }
        .sitemap-back {
            display: inline-block;
            color: var(--secondary);
            font-weight: 700;
            text-decoration: none;
            margin-bottom: 16px;
        }
        .sitemap-back:hover { text-decoration: underline; }
        .sitemap-nav { display: flex; flex-direction: column; gap: 4px; }
        .sitemap-top-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .sitemap-top-link:hover { background: var(--card); }
        .sitemap-phase {
            margin: 16px 0 6px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            padding: 0 12px;
        }
        .sitemap-link {
            display: block;
            padding: 9px 12px;
            border-radius: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.92rem;
            border-left: 3px solid transparent;
        }
        .sitemap-link:hover { background: var(--card); color: var(--text); }
        .sitemap-link.active {
            background: var(--accent-soft);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 700;
        }

        /* ---- Branch detail ---- */
        .branch-main { min-width: 0; }
        .branch-eyebrow { color: var(--accent); font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; font-size: 0.8rem; margin: 0 0 6px; }
        .branch-title { font-size: clamp(1.8rem, 4vw, 2.6rem); margin: 0 0 6px; letter-spacing: -0.02em; }
        .branch-role-lg { color: var(--muted); font-size: 1.05rem; margin: 0 0 20px; }

        .branch-progress { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
        .branch-progress .progress-bar { flex: 1; margin: 0; height: 10px; }
        .branch-progress-pct { font-weight: 800; font-size: 1.1rem; color: var(--text); min-width: 48px; text-align: right; }

        .branch-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 28px; }
        .branch-back-bottom { margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; }
        .branch-back-bottom a { color: var(--secondary); text-decoration: none; font-weight: 700; }

        /* Mobile: menu on top, single column */
        @media (max-width: 820px) {
            .branch-layout { grid-template-columns: 1fr; gap: 20px; }
            .sitemap { position: static; }
            .branch-detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="branch-layout">
        <aside class="sitemap">
            <a class="sitemap-back" href="index.html">← Back to Timeline</a>
            <nav class="sitemap-nav" id="sitemap-nav"></nav>
        </aside>

        <main class="branch-main" id="branch-main">
            <p class="meta">Loading…</p>
        </main>
    </div>

    <script>
        function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}

        function getBranchId() {
            return new URLSearchParams(window.location.search).get('branch');
        }

        async function load() {
            let data;
            try {
                const res = await fetch('roadmap.json', { cache: 'no-store' });
                if (!res.ok) throw new Error('load failed');
                data = await res.json();
            } catch (e) {
                document.getElementById('branch-main').innerHTML =
                    '<div class="error"><h1>Could not load</h1><p>roadmap.json is missing or invalid.</p></div>';
                return;
            }
            render(data);
        }

        function render(data) {
            const branches = data.branches || [];
            const phases = data.phases || [];
            const byId = Object.fromEntries(branches.map(b => [b.id, b]));
            const currentId = getBranchId();
            const current = byId[currentId];

            renderSitemap(data, branches, phases, currentId);

            const main = document.getElementById('branch-main');
            if (!current) {
                main.innerHTML = `
                    <p class="branch-eyebrow">Deadhang Labor · Branches</p>
                    <h1 class="branch-title">Pick a branch</h1>
                    <p class="branch-role-lg">Choose a branch from the menu to see its full detail.</p>`;
                return;
            }

            document.title = current.name + ' — Deadhang Labor';
            const pct = Number(current.status_percentage) || 0;
            const isFuture = current.lifecycle === 'future';
            const phaseNum = current.phase ? `Phase ${current.phase}` : '';
            const timeline = current.timeline || {};

            const blockers = (current.blockers || []).map(b => `<li>${esc(b)}</li>`).join('')
                || '<li class="meta">None recorded</li>';

            const workItems = (current.work_items || []).map(w => {
                const st = w.status || 'not_started';
                return `
                    <div class="work-item">
                        <div class="work-item-info">
                            <div class="work-item-title">${esc(w.task)}</div>
                            <div class="work-item-why">${esc(w.why || '')}</div>
                        </div>
                        <div class="work-item-status ${st}">${esc(st.replace(/_/g,' '))}</div>
                    </div>`;
            }).join('') || '<p class="meta">No work items yet.</p>';

            main.innerHTML = `
                <p class="branch-eyebrow">${esc([phaseNum, isFuture ? 'Future' : 'Active'].filter(Boolean).join(' · '))}</p>
                <h1 class="branch-title">${esc(current.name)}</h1>
                <p class="branch-role-lg">${esc(current.role || '')}</p>

                <div class="branch-progress">
                    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                    <span class="branch-progress-pct">${pct}%</span>
                </div>

                ${current.critical_blocker ? `<div class="blocker-badge">🚫 ${esc(current.critical_blocker)}</div>` : ''}

                <div class="branch-detail-grid" style="margin-top:24px;">
                    <div class="detail-box">
                        <h3>Ultimate Goal</h3>
                        <p>${esc(current.ultimate_goal || '')}</p>
                    </div>
                    <div class="detail-box">
                        <h3>Current State</h3>
                        <p>${esc(current.current_state || '')}</p>
                    </div>
                    <div class="detail-box">
                        <h3>Timeline</h3>
                        <p>${timeline.phase_1_ready ? esc(timeline.phase_1_ready + ': ' + (timeline.description || '')) : 'Not scheduled yet'}</p>
                    </div>
                    <div class="detail-box">
                        <h3>Critical Blockers</h3>
                        <ul>${blockers}</ul>
                    </div>
                </div>

                <div class="work-items-section">
                    <h3>Work Items</h3>
                    <div class="work-items-list">${workItems}</div>
                </div>

                <div class="branch-back-bottom">
                    <a href="index.html">← Back to Timeline</a>
                </div>`;
            window.scrollTo({ top: 0 });
        }

        function renderSitemap(data, branches, phases, currentId) {
            const nav = document.getElementById('sitemap-nav');
            const byId = Object.fromEntries(branches.map(b => [b.id, b]));

            let html = `
                <a class="sitemap-top-link" href="index.html">🗺️ Timeline</a>
                <a class="sitemap-top-link" href="present.html">✨ The Vision</a>`;

            const linkFor = (b) => `<a class="sitemap-link ${b.id === currentId ? 'active' : ''}" href="branch.html?branch=${encodeURIComponent(b.id)}">${esc(b.name)}</a>`;

            if (phases.length) {
                const claimed = new Set();
                phases.forEach(phase => {
                    const items = (phase.branch_ids || []).map(id => byId[id]).filter(Boolean);
                    items.forEach(b => claimed.add(b.id));
                    if (!items.length) return;
                    html += `<p class="sitemap-phase">Phase ${phase.number ?? ''} — ${esc(phase.name)}</p>`;
                    html += items.map(linkFor).join('');
                });
                const orphans = branches.filter(b => !claimed.has(b.id));
                if (orphans.length) {
                    html += `<p class="sitemap-phase">Other</p>` + orphans.map(linkFor).join('');
                }
            } else {
                html += `<p class="sitemap-phase">Branches</p>` + branches.map(linkFor).join('');
            }

            nav.innerHTML = html;
        }

        window.addEventListener('popstate', load);
        load();
    </script>
</body>
</html>
