<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Dashboard - 50-Year Roadmap</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <p class="eyebrow">50-Year Roadmap</p>
        <h1>Work Dashboard</h1>
        <div class="ultimate-goal">
            <p id="ultimate-goal-text"></p>
        </div>
        <div class="header-actions">
            <button id="view-all-work">View All Work</button>
            <button id="view-this-week" class="active">This Week</button>
        </div>
    </header>

    <main>
        <!-- Phase & Status -->
        <section id="phase-section" class="phase-banner">
            <div class="phase-content">
                <h2 id="phase-title"></h2>
                <p id="phase-description"></p>
            </div>
        </section>

        <!-- This Week's Focus -->
        <section id="this-week-section" class="focus-section">
            <h2 id="focus-heading">Your Focus This Week</h2>
            <div id="this-week-tasks" class="tasks-grid"></div>
        </section>

        <!-- Branches -->
        <section id="branches-section">
            <h2 id="branches-heading">The Branches</h2>
            <p class="section-intro">What needs to be built to reach your ultimate goal</p>
            <div id="branches-grid" class="branches-grid"></div>
            <div id="branches-pagination" class="pagination pagination-bottom">
                <button class="pagination-btn" id="branches-prev" aria-label="Previous branches page">←</button>
                <span class="pagination-info"><span id="branches-page">1</span> / <span id="branches-total">2</span></span>
                <button class="pagination-btn" id="branches-next" aria-label="Next branches page">→</button>
            </div>
        </section>

        <!-- Branch Detail Panel -->
        <section id="branch-detail-section" class="detail-section" style="display: none;">
            <h2 id="branch-detail-title"></h2>
            <div class="detail-content">
                <div class="detail-col">
                    <div class="detail-box">
                        <h3>Ultimate Goal</h3>
                        <p id="branch-goal"></p>
                    </div>
                    <div class="detail-box">
                        <h3>Current State</h3>
                        <p id="branch-current"></p>
                    </div>
                    <div class="detail-box">
                        <h3>Timeline for Phase 1</h3>
                        <p id="branch-timeline"></p>
                    </div>
                </div>
                <div class="detail-col">
                    <div class="detail-box">
                        <h3>Critical Blockers</h3>
                        <ul id="branch-blockers"></ul>
                    </div>
                </div>
            </div>
            <div class="work-items-section">
                <h3>Work Items</h3>
                <div id="branch-work-items" class="work-items-list"></div>
                <div id="work-items-pagination" class="pagination pagination-bottom">
                    <button class="pagination-btn" id="work-items-prev" aria-label="Previous work items page">←</button>
                    <span class="pagination-info"><span id="work-items-page">1</span> / <span id="work-items-total">1</span></span>
                    <button class="pagination-btn" id="work-items-next" aria-label="Next work items page">→</button>
                </div>
            </div>
            <button id="close-detail" class="close-button">← Back to Dashboard</button>
        </section>

        <!-- Ecosystem Flow -->
        <section id="ecosystem-section">
            <h2>How It All Connects</h2>
            <div class="ecosystem-flow" id="ecosystem-flow"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
