<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50-Year Roadmap Command Center</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <p class="eyebrow">50-Year Roadmap</p>
        <h1>Operations Command Center</h1>
        <p>A repo-backed roadmap, memory, evidence, and project-state dashboard.</p>
        <div class="header-actions">
            <button id="jump-to-now">You Are Now Here</button>
            <button id="collapse-all" class="secondary-button">Collapse All</button>
            <button id="expand-critical" class="secondary-button">Expand Critical</button>
        </div>
        <div class="metrics"></div>
    </header>

    <main>
        <section id="timeframe-section">
            <h2>Milestone Lens</h2>
            <p class="section-intro">Zoom the same roadmap between immediate work and the 50-year vision.</p>
            <div id="timeframe-nav" class="timeframe-nav" aria-label="Milestone timeframe navigation"></div>
            <div id="timeframe-lens"></div>
        </section>

        <section id="frontier-section">
            <h2>You Are Now Here</h2>
            <div id="frontier-container"></div>
        </section>

        <section id="decision-context-section">
            <h2>Decision Context</h2>
            <div id="decision-context-container"></div>
        </section>

        <section id="controls-section" class="toolbar">
            <label for="roadmap-search">Search roadmap</label>
            <input id="roadmap-search" type="search" placeholder="Search pillars, blockers, completed items...">
            <label for="status-filter">View</label>
            <select id="status-filter">
                <option value="all">All</option>
                <option value="active">Active pillars</option>
                <option value="blocked">Blockers</option>
                <option value="moved_later">Moved later</option>
                <option value="completed">Completed</option>
            </select>
        </section>

        <section id="pillars-section">
            <h2>Roadmap Pillars</h2>
            <div id="pillars-grid" class="grid"></div>
        </section>

        <section id="blocked-section">
            <h2>Blockers</h2>
            <div id="blocker-controls"></div>
            <div id="blocked-list" class="grid"></div>
        </section>

        <section id="later-section">
            <h2>Moved Later</h2>
            <div id="later-list" class="grid"></div>
        </section>

        <section id="completed-section">
            <h2>Completed</h2>
            <div id="completed-list" class="grid"></div>
        </section>
    </main>

    <aside id="detail-panel" class="detail-panel" aria-hidden="true">
        <div class="detail-panel-inner">
            <button id="close-detail" class="close-button" aria-label="Close detail panel">×</button>
            <div id="detail-content"></div>
        </div>
    </aside>

    <script src="app.js"></script>
</body>
</html>
